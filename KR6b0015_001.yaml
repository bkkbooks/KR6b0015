body:
  text: 大唐三藏法師義淨奉制譯如是我聞一時薄伽梵在室羅伐城逝多林給孤獨園爾時世尊從定起已為諸四衆演説無上甘露妙法時有無量百千大衆前後圍繞諸根不動聽聞法要時諸苾芻既見大衆身心寂靜殷勤聽法咸皆有疑白佛言世尊唯願慈悲為斷疑網如來大師無上法王今此座中聽法諸人何故殷勤身心不動聽聞妙法如飲甘露世尊告曰汝等苾芻我於往昔為求法故敬心殷重汝等諦聽善思念之吾當為汝説彼因緣乃往古昔於婆羅痆斯大城中有王名曰妙色以法化世國土豐樂人民熾盛無諸鬪戰詐偽怨賊亦無病苦災橫之事稻蔗牛羊在處充滿亦無瓦礫荒梗棘刺恩育兆人如觀一子其王敬信意樂賢善自利利人發堅固願有慈心希大法愍人衆愛群官除去慳貪常為大捨王之夫人名曰妙容顏貌端正威儀詳審衆德圓滿人所愛樂其王唯有一男名端正子年雖幼小忠孝仁慈王所愛念無離左右後於異時其妙色王心悕勝法召集群僚而告之曰我於妙法情生渴仰卿等宜應為我詢訪時諸大臣前白王曰大王當知大覺世尊出興世者方有妙法王報臣曰今雖無佛試為我求時王即便以箱盛妙金寶懸於幢上鳴鼓宣令普告四方若有為我宣勝法者我以金箱報其恩德廣設音樂而慶讚之如是詔召經歷多時竟無一人能為説法時王渴仰懷憂而住爾時帝釋遍觀下界誰善誰惡誰於勝因情無懈倦遂見此王為法憂惱便作是念此妙色王久悕勝法我當試之其事虛實遂即化作大藥叉身手足異常面目可畏來至衆中而白王曰仁求勝法我能説之王聞法音歡喜踊躍告藥叉曰密迹主有妙法者幸願為説我當諦聽藥叉告曰大王今者生輕法心謂為易得即令宣説事不應然我身飢虛何能為説王聞語已尋命膳官所有上食速宜奉進藥叉告曰王厨之食非我所餐唯人熱血肉是我常食王曰人之血肉何可卒求藥叉曰王之愛子宜應見與王聞此語便作是念我久辛苦尋求勝法今聞法音便成無價時端正子在父邊立聞是語已跪白王曰唯願父王勿生憂惱父之所望當令滿足可持我身奉密迹主以充其食王曰汝見求法捨所愛身善哉丈夫隨汝所樂其端正子即便以身奉上藥叉藥叉受已對王大衆分裂其身噉肉飲血王雖見此慕法情深了無驚懼時密迹主復告王曰我仍未飽更與汝妻時妙容夫人亦在王側聞斯語已亦同其子身奉藥叉藥叉受已噉其血肉復告王曰然我飢虛尚未充足王便白言密迹主一子已施妻復重食尚云飢虛隨意當取我願供給無退轉心藥叉告曰王之自身宜與我食王曰善哉實不敢吝然我身死如何聞法今我先可聽其妙法既受持已當即捨身是時藥叉共王立要即於無量百千萬億大衆之中説勝妙伽他曰由愛故生憂由愛故生怖若離於愛者無憂亦無怖王既聞此勝妙法已心生慶幸歡悅無量告密迹主曰我已聞法如説奉持今我此身隨意當食時天帝釋見王為法身心不動如妙高山知其必當證無上覺捨藥叉像復天帝形信喜內充怡顏前進一手携子一手持妻而告王曰善哉善哉是善丈夫堅裝甲胄破煩惱軍濟度愚迷出生死海觀斯勇猛必當不久能成無上正等菩提汝之妻子我今相付時王即便白天帝曰善哉善哉天主憍尸迦降大慈悲為善知識已能滿我樂法之心是時天帝於大衆中忽然不現爾時世尊告諸苾芻於汝意云何勿生異念彼時妙色王者即我身是端正子者羅怙羅是妻妙容者即耶輸陀羅是汝等當知我往昔時為求法故捨所愛妻子及以已身尚無所吝何況餘物由此緣故今時所有一切大衆從我聞法專心聽受無有疲厭又由我昔求法忘勞今於長夜為衆説法亦無疲倦汝等苾芻當學於我恭敬尊重勤求勝法既聞法已如説修行勿為放逸爾時諸苾芻及人天衆聞佛説已歡喜奉行
